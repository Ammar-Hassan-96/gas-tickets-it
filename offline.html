<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAS Portal — غير متصل</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Tajawal', system-ui, sans-serif;
    background: #0A0A0C;
    color: #E8E8E8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .card {
    background: #17171B;
    border: 1px solid #B8975A33;
    border-radius: 16px;
    padding: 48px 32px;
    max-width: 380px;
    width: 100%;
  }
  .icon {
    font-size: 64px;
    margin-bottom: 24px;
    display: block;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #B8975A;
    margin-bottom: 12px;
  }
  p {
    color: #888;
    font-size: 14px;
    line-height: 1.8;
    margin-bottom: 28px;
  }
  button {
    background: #B8975A;
    color: #0A0A0C;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: opacity .2s;
  }
  button:hover { opacity: .85; }
</style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>يبدو إنك مش متصل دلوقتي.<br>تأكد من الإنترنت وحاول مرة تانية.</p>
    <button onclick="location.reload()">🔄 إعادة المحاولة</button>
  </div>
  <script>
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
